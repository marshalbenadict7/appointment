<!DOCTYPE html>
<html>
<head>
    <title>MedLife Hospital</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f2f2f2;
        }

        .card{
            border-radius:15px;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <!-- Hospital Name -->
    <h1 class="text-center text-primary mb-3">
        MedLife Hospital
    </h1>

    <div class="card p-4 shadow mx-auto"
    style="max-width:650px;">

        <h2 class="text-center mb-4">
            Patient Appointment Form
        </h2>

        <!-- Patient Name -->
        <input type="text"
        id="patient"
        class="form-control mb-3"
        placeholder="Patient Name">

        <!-- Age -->
        <input type="number"
        id="age"
        class="form-control mb-3"
        placeholder="Age">

        <!-- Phone -->
        <input type="number"
        id="phone"
        class="form-control mb-3"
        placeholder="Phone Number">

        <!-- Doctor -->
        <select id="doctor"
        class="form-select mb-3"
        onchange="setDoctorDetails()">

            <option value="">
                Select Doctor
            </option>

            <option value="raj">
                Dr. Raj - General Physician
            </option>

            <option value="kumar">
                Dr. Kumar - Cardiologist
            </option>

            <option value="priya">
                Dr. Priya - Dermatologist
            </option>

            <option value="arun">
                Dr. Arun - Neurologist
            </option>

            <option value="meena">
                Dr. Meena - Pediatrician
            </option>

        </select>

        <!-- Doctor Timing -->
        <input type="text"
        id="timing"
        class="form-control mb-3"
        placeholder="Doctor Timing"
        readonly>

        <!-- Fees -->
        <input type="number"
        id="fees"
        class="form-control mb-3"
        placeholder="Fees"
        readonly>

        <!-- Date -->
        <input type="date"
        id="date"
        class="form-control mb-3">

        <!-- Problem -->
        <textarea id="problem"
        class="form-control mb-3"
        placeholder="Describe Your Problem"></textarea>

        <!-- Button -->
        <button class="btn btn-primary w-100"
        onclick="bookAppointment()">

            Confirm Appointment

        </button>

    </div>

    <!-- Output -->
    <div id="output" class="mt-4"></div>

    <!-- Patient History -->
    <div class="card p-4 shadow mt-4">

        <h3 class="text-center text-success">
             Patient History
        </h3>

        <div id="history"></div>

    </div>

</div>

<script>

// Token Number
let token = 1;

// Doctor Details
function setDoctorDetails(){

    let doctor =
    document.getElementById("doctor").value;

    if(doctor=="raj"){

        document.getElementById("fees").value = 500;

        document.getElementById("timing").value =
        "10 AM - 1 PM";
    }

    else if(doctor=="kumar"){

        document.getElementById("fees").value = 700;

        document.getElementById("timing").value =
        "2 PM - 5 PM";
    }

    else if(doctor=="priya"){

        document.getElementById("fees").value = 900;

        document.getElementById("timing").value =
        "11 AM - 3 PM";
    }

    else if(doctor=="arun"){

        document.getElementById("fees").value = 1200;

        document.getElementById("timing").value =
        "4 PM - 8 PM";
    }

    else if(doctor=="meena"){

        document.getElementById("fees").value = 600;

        document.getElementById("timing").value =
        "9 AM - 12 PM";
    }
}

// Appointment Function
function bookAppointment(){

    let patient =
    document.getElementById("patient").value;

    let age =
    document.getElementById("age").value;

    let phone =
    document.getElementById("phone").value;

    let doctor =
    document.getElementById("doctor");

    let doctorName =
    doctor.options[doctor.selectedIndex].text;

    let timing =
    document.getElementById("timing").value;

    let fees =
    document.getElementById("fees").value;

    let date =
    document.getElementById("date").value;

    let problem =
    document.getElementById("problem").value;

    // Validation
    if(patient=="" ||
       age=="" ||
       phone=="" ||
       timing=="" ||
       fees=="" ||
       date=="" ||
       problem==""){

        alert("Please fill all fields");
        return;
    }

    // Appointment ID
    let appointmentId =
    "APT" + Math.floor(Math.random()*10000);

    // Output
    document.getElementById("output")
    .innerHTML = `

    <div class="card p-4 shadow">

        <h3 class="text-success">
             Appointment Confirmed
        </h3>

        <hr>

        <p><b>Appointment ID:</b> ${appointmentId}</p>

        <p><b>Token Number:</b> ${token}</p>

        <p><b>Patient:</b> ${patient}</p>

        <p><b>Age:</b> ${age}</p>

        <p><b>Phone:</b> ${phone}</p>

        <p><b>Doctor:</b> ${doctorName}</p>

        <p><b>Doctor Timing:</b> ${timing}</p>

        <p><b>Fees:</b> ₹${fees}</p>

        <p><b>Date:</b> ${date}</p>

        <p><b>Problem:</b> ${problem}</p>

    </div>
    `;

    // Patient History
    document.getElementById("history")
    .innerHTML += `

    <div class="card p-3 mb-3">

        <p><b>${patient}</b></p>

        <p>${doctorName}</p>

        <p>Token: ${token}</p>

        <p>Date: ${date}</p>

    </div>
    `;

    // Increase Token
    token++;
}

</script>

</body>
</html>
